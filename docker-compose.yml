name: rwa-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?https://api.example.com}
        VITE_BLOCK_EXPLORER_URL: ${VITE_BLOCK_EXPLORER_URL:-https://mempool.space}
    environment:
      NODE_ENV: production
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

