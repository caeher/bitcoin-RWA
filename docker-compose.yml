name: rwa-frontend

services:
  frontend:
    image: node:20-alpine
    container_name: rwa-frontend
    working_dir: /app
    command: >
      sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:

