name: rwa-frontend

services:
  frontend:
    image: node:20-alpine
    container_name: rwa-frontend
    working_dir: /app
    command: >
      sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://gateway:8000
      - VITE_WS_URL=ws://gateway:8000/ws
    networks:
      - platform
    extra_hosts:
      - "gateway:host-gateway"

volumes:
  node_modules:

networks:
  platform:
    external: true
    name: tokenization-local-platform
